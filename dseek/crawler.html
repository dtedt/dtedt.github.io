
<!DOCTYPE html>
<html lang="en">
<head>
    <base target="_self">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dungeon Crawler - Mobile RPG</title>
    <meta name="description" content="A mobile-first grid-based dungeon crawler game with touch controls">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=MedievalSharp&family=Roboto:wght@300;400;500;700&display=swap');
        
        :root {
            --dungeon-wall: #2c3e50;
            --dungeon-floor: #34495e;
            --dungeon-player: #e74c3c;
            --dungeon-exit: #2ecc71;
            --dungeon-enemy: #f39c12;
            --dungeon-treasure: #f1c40f;
        }
        
        body {
            font-family: 'Roboto', sans-serif;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        .game-font {
            font-family: 'MedievalSharp', cursive;
        }
        
        .dungeon-cell {
            transition: all 0.2s ease;
        }
        
        .dungeon-cell:hover {
            transform: scale(1.05);
        }
        
        .touch-button {
            transition: all 0.1s ease;
            touch-action: manipulation;
        }
        
        .touch-button:active {
            transform: scale(0.95);
            opacity: 0.8;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .animate-fadeIn {
            animation: fadeIn 0.5s ease-in;
        }
        
        .animate-pulse-slow {
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-b from-gray-900 to-black text-white overflow-hidden">
    <!-- Game Container -->
    <div class="flex flex-col h-screen max-h-screen">
        <!-- Game Header -->
        <header class="bg-gray-800 border-b border-gray-700 p-4">
            <div class="container mx-auto">
                <div class="flex justify-between items-center">
                    <div>
                        <h1 class="game-font text-2xl md:text-3xl text-yellow-400">Dungeon Crawler</h1>
                        <p class="text-gray-400 text-sm">Grid-based RPG Adventure</p>
                    </div>
                    <div class="flex items-center space-x-4">
                        <div class="text-right">
                            <div class="flex items-center space-x-2">
                                <span class="text-yellow-300"><i class="fas fa-heart"></i></span>
                                <span id="health" class="font-bold">100/100</span>
                            </div>
                            <div class="flex items-center space-x-2">
                                <span class="text-blue-300"><i class="fas fa-bolt"></i></span>
                                <span id="mana" class="font-bold">50/50</span>
                            </div>
                        </div>
                        <button id="menu-toggle" class="bg-gray-700 hover:bg-gray-600 p-2 rounded-lg touch-button">
                            <i class="fas fa-bars text-xl"></i>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Game Area -->
        <main class="flex-1 overflow-hidden">
            <div class="container mx-auto h-full p-2 md:p-4">
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 h-full">
                    <!-- Dungeon View (Left Column) -->
                    <div class="lg:col-span-2 flex flex-col h-full">
                        <!-- Minimap -->
                        <div class="bg-gray-800 rounded-lg p-3 mb-3 border border-gray-700">
                            <div class="flex justify-between items-center mb-2">
                                <h2 class="game-font text-lg text-yellow-300">Dungeon Level 1</h2>
                                <div class="flex items-center space-x-2">
                                    <span class="text-green-400"><i class="fas fa-map-marker-alt"></i></span>
                                    <span id="player-position" class="text-sm">Position: (0,0)</span>
                                </div>
                            </div>
                            <div id="minimap" class="grid grid-cols-5 gap-1 mx-auto" style="max-width: 250px;">
                                <!-- Minimap will be generated by JavaScript -->
                            </div>
                        </div>

                        <!-- Main Dungeon Grid -->
                        <div class="flex-1 bg-gray-900 rounded-xl border-2 border-gray-700 p-4 overflow-auto">
                            <div class="flex flex-col items-center justify-center h-full">
                                <div id="dungeon-grid" class="grid grid-cols-7 gap-2 md:gap-3">
                                    <!-- Dungeon grid will be generated by JavaScript -->
                                </div>
                                <div class="mt-6 text-center">
                                    <p id="game-message" class="text-yellow-300 game-font text-lg animate-pulse-slow">
                                        Enter the dungeon...
                                    </p>
                                    <p class="text-gray-400 text-sm mt-2">
                                        Use touch controls or keyboard arrows to move
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Game Info & Controls (Right Column) -->
                    <div class="flex flex-col h-full space-y-4">
                        <!-- Player Stats -->
                        <div class="bg-gray-800 rounded-xl p-4 border border-gray-700">
                            <h3 class="game-font text-xl text-yellow-300 mb-3">Player Stats</h3>
                            <div class="space-y-3">
                                <div>
                                    <div class="flex justify-between mb-1">
                                        <span class="text-gray-300">Health</span>
                                        <span class="font-bold" id="stat-health">100</span>
                                    </div>
                                    <div class="w-full bg-gray-700 rounded-full h-2">
                                        <div id="health-bar" class="bg-red-500 h-2 rounded-full" style="width: 100%"></div>
                                    </div>
                                </div>
                                <div>
                                    <div class="flex justify-between mb-1">
                                        <span class="text-gray-300">Mana</span>
                                        <span class="font-bold" id="stat-mana">50</span>
                                    </div>
                                    <div class="w-full bg-gray-700 rounded-full h-2">
                                        <div id="mana-bar" class="bg-blue-500 h-2 rounded-full" style="width: 100%"></div>
                                    </div>
                                </div>
                                <div>
                                    <div class="flex justify-between mb-1">
                                        <span class="text-gray-300">Experience</span>
                                        <span class="font-bold" id="stat-exp">0/100</span>
                                    </div>
                                    <div class="w-full bg-gray-700 rounded-full h-2">
                                        <div id="exp-bar" class="bg-green-500 h-2 rounded-full" style="width: 0%"></div>
                                    </div>
                                </div>
                            </div>
                            <div class="mt-4 grid grid-cols-2 gap-2">
                                <div class="text-center p-2 bg-gray-700 rounded">
                                    <div class="text-yellow-300 font-bold" id="stat-level">1</div>
                                    <div class="text-xs text-gray-400">Level</div>
                                </div>
                                <div class="text-center p-2 bg-gray-700 rounded">
                                    <div class="text-yellow-300 font-bold" id="stat-gold">0</div>
                                    <div class="text-xs text-gray-400">Gold</div>
                                </div>
                            </div>
                        </div>

                        <!-- Touch Controls -->
                        <div class="bg-gray-800 rounded-xl p-4 border border-gray-700">
                            <h3 class="game-font text-xl text-yellow-300 mb-4">Movement Controls</h3>
                            <div class="flex flex-col items-center space-y-3">
                                <!-- Up Button -->
                                <button id="move-up" class="touch-button w-16 h-16 bg-gray-700 hover:bg-gray-600 rounded-full flex items-center justify-center">
                                    <i class="fas fa-arrow-up text-2xl"></i>
                                </button>
                                
                                <!-- Middle Row -->
